<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cashflow Pro – Add Expense</title>
  <style>
    /* ----- RESET & GLOBAL (Material Design inspired) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 12px;
    }

    /* mobile-first container (max width 400px) */
    .phone-frame {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      background-color: #f9fbfd;
      box-shadow: 0 20px 35px -8px rgba(0,30,60,0.15), 0 5px 12px rgba(0,0,0,0.05);
      border-radius: 36px 36px 28px 28px;
      overflow: hidden;
    }

    /* main screen content */
    .addexpense-screen {
      padding: 28px 24px 40px 24px;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    /* ----- LOGO (top of every screen) ----- */
    .logo-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0a2540;  /* primary dark blue */
      padding: 10px 24px;
      border-radius: 44px;
      box-shadow: 0 6px 12px rgba(10,37,64,0.12);
    }

    .logo-icon {
      background-color: #2ecc71; /* green accent */
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 20px;
      box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
    }

    .logo-text {
      color: white;
      font-weight: 600;
      font-size: 1.45rem;
      letter-spacing: 0.4px;
    }

    /* screen title */
    .screen-title {
      font-size: 1.8rem;
      font-weight: 500;
      color: #0a2540;
      margin-bottom: 24px;
      letter-spacing: -0.2px;
    }

    /* form card */
    .form-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 26px 22px;
      box-shadow: 0 18px 30px -12px rgba(10,37,64,0.15), 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(10,37,64,0.05);
      width: 100%;
      margin-bottom: 16px;
    }

    /* input fields */
    .input-field {
      margin-bottom: 24px;
      width: 100%;
    }

    .input-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #3a4e66;
      margin-bottom: 6px;
      margin-left: 8px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f1f6fa;
      border-radius: 50px;
      padding: 4px 20px;
      border: 1.5px solid transparent;
      transition: border 0.2s, background 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .input-wrapper:focus-within {
      border-color: #0a2540;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(10,37,64,0.08);
    }

    .input-icon {
      color: #6b7f96;
      margin-right: 10px;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .input-wrapper input,
    .input-wrapper select {
      width: 100%;
      border: none;
      background: transparent;
      padding: 16px 0;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      color: #1a2b3e;
    }

    .input-wrapper select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b7f96' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 18px;
      color: #1a2b3e;
    }

    .input-wrapper input::placeholder {
      color: #9aafc4;
      font-weight: 400;
    }

    /* dropdown specific */
    select {
      cursor: pointer;
    }

    /* upload receipt button style (UI only) */
    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #ffffff;
      border: 2px dashed #0a2540;
      border-radius: 60px;
      padding: 16px 20px;
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      color: #0a2540;
      background-color: #f4f8fe;
      margin: 8px 0 20px 0;
      cursor: default;
      box-shadow: 0 6px 14px -6px rgba(10,37,64,0.1);
      transition: background 0.1s;
    }

    .upload-btn .icon-symbol {
      font-size: 1.3rem;
    }

    /* primary save button */
    .btn-primary {
      background: #0a2540;
      border: none;
      width: 100%;
      padding: 18px 24px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      letter-spacing: 0.5px;
      box-shadow: 0 14px 26px -8px rgba(10,37,64,0.4), 0 4px 10px rgba(0,0,0,0.1);
      cursor: default;  /* UI only */
      margin-top: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* sample data hints (success/warning) */
    .sample-hints {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px 0 10px;
      flex-wrap: wrap;
    }

    .hint-success {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #e2f7e9;
      color: #1d8844;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .hint-warning {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #ffeae8;
      color: #c73b3b;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .icon-symbol {
      font-size: 1.1rem;
      line-height: 1;
    }

    /* small note for demo */
    .demo-footer {
      text-align: center;
      margin-top: 20px;
      color: #a7b8c9;
      font-size: 0.8rem;
      font-weight: 400;
    }

    /* soft shadows */
    .form-card, .upload-btn, .btn-primary, .input-wrapper {
      box-shadow: 0 8px 18px -8px rgba(10,37,64,0.08);
    }
  </style>
</head>
<body>
  <!-- mobile frame -->
  <div class="phone-frame">
    <!-- add expense screen content -->
    <div class="addexpense-screen">

      <!-- Cashflow Pro logo at the top -->
      <div class="logo-wrapper">
        <div class="logo">
          <div class="logo-icon">$</div>
          <span class="logo-text">Cashflow Pro</span>
        </div>
      </div>

      <!-- title -->
      <div class="screen-title">Add Expense</div>

      <!-- main form card -->
      <div class="form-card">

        <!-- amount field -->
        <div class="input-field">
          <span class="input-label">Amount (R)</span>
          <div class="input-wrapper">
            <span class="input-icon">💰</span>
            <input type="text" placeholder="0.00" value="129.99" readonly>
          </div>
        </div>

        <!-- date field -->
        <div class="input-field">
          <span class="input-label">Date</span>
          <div class="input-wrapper">
            <span class="input-icon">📅</span>
            <input type="text" placeholder="YYYY-MM-DD" value="2026-03-19" readonly>
          </div>
        </div>

        <!-- description field -->
        <div class="input-field">
          <span class="input-label">Description</span>
          <div class="input-wrapper">
            <span class="input-icon">📝</span>
            <input type="text" placeholder="e.g., Weekly groceries" value="Grocery store" readonly>
          </div>
        </div>

        <!-- category dropdown -->
        <div class="input-field">
          <span class="input-label">Category</span>
          <div class="input-wrapper">
            <span class="input-icon">🏷️</span>
            <select>
              <option value="groceries" selected>Groceries</option>
              <option value="transport">Transport</option>
              <option value="entertainment">Entertainment</option>
              <option value="utilities">Utilities</option>
              <option value="dining">Dining out</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <!-- upload receipt button (UI only) -->
        <div class="upload-btn">
          <span class="icon-symbol">📎</span> Upload Receipt
        </div>

        <!-- save expense button (primary) -->
        <button class="btn-primary">Save Expense</button>

      </div> <!-- end form card -->

      <!-- sample data summary (green/red hints) -->
      <div class="sample-hints">
        <span class="hint-success">
          <span class="icon-symbol">✓</span> R1,800 left
        </span>
        <span class="hint-warning">
          <span class="icon-symbol">!</span> Entertainment +50%
        </span>
      </div>

      <!-- subtle demo footer -->
      <div class="demo-footer">
        All amounts in ZAR • receipt upload available
      </div>
    </div> <!-- end addexpense-screen -->
  </div> <!-- end phone-frame -->

  <!-- design comments:
    - Primary dark blue: #0a2540 (logo, button, focus border, upload border)
    - Accent green: #2ecc71 (logo icon, success hint)
    - Warning red: #c73b3b (warning hint)
    - Background: soft white with light gray body
    - Form card with soft shadow, input wrappers rounded, upload button dashed
    - Minimal icons: money, calendar, note, tag, paperclip
    - Logo at top as requested
    - Sample data shows remaining budget and category warning
    - Mobile-first, max-width 400px, clean and simple
    - No backend, UI only, pre-filled sample fields
  -->
</body>
</html>
