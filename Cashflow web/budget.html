<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cashflow Pro – Budget Settings</title>
  <style>
    /* ----- RESET & GLOBAL (Material Design inspired) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eef2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 12px;
    }

    /* mobile-first container (max width 400px) */
    .phone-frame {
      max-width: 400px;
      width: 100%;
      margin: 0 auto;
      background-color: #f9fbfd;
      box-shadow: 0 20px 35px -8px rgba(0,30,60,0.15), 0 5px 12px rgba(0,0,0,0.05);
      border-radius: 36px 36px 28px 28px;
      overflow: hidden;
    }

    /* main screen content */
    .settings-screen {
      padding: 28px 24px 40px 24px;
      display: flex;
      flex-direction: column;
      background-color: #ffffff;
    }

    /* ----- LOGO (top of every screen) ----- */
    .logo-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0a2540;  /* primary dark blue */
      padding: 10px 24px;
      border-radius: 44px;
      box-shadow: 0 6px 12px rgba(10,37,64,0.12);
    }

    .logo-icon {
      background-color: #2ecc71; /* green accent */
      width: 30px;
      height: 30px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 20px;
      box-shadow: inset 0 -2px 3px rgba(0,0,0,0.1);
    }

    .logo-text {
      color: white;
      font-weight: 600;
      font-size: 1.45rem;
      letter-spacing: 0.4px;
    }

    /* screen title */
    .screen-title {
      font-size: 1.8rem;
      font-weight: 500;
      color: #0a2540;
      margin-bottom: 24px;
      letter-spacing: -0.2px;
    }

    /* settings card */
    .settings-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 26px 22px;
      box-shadow: 0 18px 30px -12px rgba(10,37,64,0.15), 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid rgba(10,37,64,0.05);
      width: 100%;
      margin-bottom: 20px;
    }

    /* section headings */
    .section-heading {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0a2540;
      margin: 16px 0 12px 0;
      padding-bottom: 4px;
      border-bottom: 2px solid #e6edf5;
    }

    .section-heading:first-of-type {
      margin-top: 0;
    }

    /* input fields */
    .input-field {
      margin-bottom: 22px;
      width: 100%;
    }

    .input-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      color: #3a4e66;
      margin-bottom: 6px;
      margin-left: 8px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f1f6fa;
      border-radius: 50px;
      padding: 4px 20px;
      border: 1.5px solid transparent;
      transition: border 0.2s, background 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .input-wrapper:focus-within {
      border-color: #0a2540;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(10,37,64,0.08);
    }

    .input-icon {
      color: #6b7f96;
      margin-right: 10px;
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .input-wrapper input {
      width: 100%;
      border: none;
      background: transparent;
      padding: 16px 0;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      color: #1a2b3e;
    }

    .input-wrapper input::placeholder {
      color: #9aafc4;
      font-weight: 400;
    }

    /* category budget limits - each as a compact row */
    .category-limit-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      background: #f8fafd;
      border-radius: 60px;
      padding: 6px 18px 6px 12px;
      border: 1px solid #e9eef4;
    }

    .category-icon {
      font-size: 1.3rem;
      min-width: 32px;
      text-align: center;
    }

    .category-name {
      flex: 1;
      font-weight: 600;
      color: #0a2540;
      font-size: 1rem;
    }

    .budget-input-small {
      display: flex;
      align-items: center;
      background: white;
      border-radius: 40px;
      border: 1px solid #d0ddee;
      padding: 6px 12px;
      max-width: 110px;
    }

    .budget-input-small span {
      color: #5d738b;
      margin-right: 4px;
      font-weight: 500;
    }

    .budget-input-small input {
      width: 70px;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      font-weight: 600;
      color: #0a2540;
      outline: none;
      text-align: right;
    }

    .budget-input-small input::placeholder {
      color: #b6c8dd;
    }

    /* save button (primary) */
    .btn-primary {
      background: #0a2540;
      border: none;
      width: 100%;
      padding: 18px 24px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: white;
      letter-spacing: 0.5px;
      box-shadow: 0 14px 26px -8px rgba(10,37,64,0.4), 0 4px 10px rgba(0,0,0,0.1);
      cursor: default; /* UI only */
      margin: 10px 0 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* sample hints (green/red summary) */
    .summary-hints {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 8px 0 0;
    }

    .hint-success {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #e2f7e9;
      color: #1d8844;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .hint-warning {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #ffeae8;
      color: #c73b3b;
      padding: 6px 18px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .icon-symbol {
      font-size: 1.1rem;
      line-height: 1;
    }

    /* demo footer */
    .demo-footer {
      text-align: center;
      margin-top: 24px;
      color: #a7b8c9;
      font-size: 0.8rem;
      font-weight: 400;
    }

    /* soft shadows */
    .settings-card, .btn-primary, .input-wrapper, .category-limit-item {
      box-shadow: 0 6px 12px -6px rgba(10,37,64,0.08);
    }
  </style>
</head>
<body>
  <!-- mobile frame -->
  <div class="phone-frame">
    <!-- budget settings screen content -->
    <div class="settings-screen">

      <!-- Cashflow Pro logo at the top -->
      <div class="logo-wrapper">
        <div class="logo">
          <div class="logo-icon">$</div>
          <span class="logo-text">Cashflow Pro</span>
        </div>
      </div>

      <!-- title -->
      <div class="screen-title">Budget Settings</div>

      <!-- main settings card -->
      <div class="settings-card">

        <!-- monthly budget field -->
        <div class="section-heading">Monthly Budget</div>
        <div class="input-field">
          <span class="input-label">Total monthly budget (R)</span>
          <div class="input-wrapper">
            <span class="input-icon">📊</span>
            <input type="text" placeholder="e.g., 5000" value="5,000" readonly>
          </div>
        </div>

        <!-- category budget limits section -->
        <div class="section-heading">Category Budget Limits</div>

        <!-- Groceries category limit -->
        <div class="category-limit-item">
          <span class="category-icon">🛒</span>
          <span class="category-name">Groceries</span>
          <div class="budget-input-small">
            <span>R</span>
            <input type="text" value="1,500" placeholder="0" readonly>
          </div>
        </div>

        <!-- Transport category limit -->
        <div class="category-limit-item">
          <span class="category-icon">🚗</span>
          <span class="category-name">Transport</span>
          <div class="budget-input-small">
            <span>R</span>
            <input type="text" value="800" placeholder="0" readonly>
          </div>
        </div>

        <!-- Entertainment category limit -->
        <div class="category-limit-item">
          <span class="category-icon">🍿</span>
          <span class="category-name">Entertainment</span>
          <div class="budget-input-small">
            <span>R</span>
            <input type="text" value="900" placeholder="0" readonly>
          </div>
        </div>

        <!-- Dining out category limit (extra example) -->
        <div class="category-limit-item">
          <span class="category-icon">🍽️</span>
          <span class="category-name">Dining out</span>
          <div class="budget-input-small">
            <span>R</span>
            <input type="text" value="600" placeholder="0" readonly>
          </div>
        </div>

        <!-- Utilities category limit (extra) -->
        <div class="category-limit-item">
          <span class="category-icon">💡</span>
          <span class="category-name">Utilities</span>
          <div class="budget-input-small">
            <span>R</span>
            <input type="text" value="1,000" placeholder="0" readonly>
          </div>
        </div>

        <!-- save settings button -->
        <button class="btn-primary">
          <span class="icon-symbol">💾</span> Save Settings
        </button>

      </div> <!-- end settings card -->

      <!-- sample summary (green/red hints) -->
      <div class="summary-hints">
        <span class="hint-success">
          <span class="icon-symbol">✓</span> R1,800 remaining
        </span>
        <span class="hint-warning">
          <span class="icon-symbol">!</span> Entertainment +50%
        </span>
      </div>

      <!-- subtle demo footer -->
      <div class="demo-footer">
        Adjust limits • changes auto-save demo
      </div>
    </div> <!-- end settings-screen -->
  </div> <!-- end phone-frame -->

  <!-- design comments:
    - Primary dark blue: #0a2540 (logo, section headings, category names, button)
    - Accent green: #2ecc71 (logo icon, success hint)
    - Warning red: #c73b3b (warning hint)
    - Background: soft white with light gray body
    - Settings card with soft shadow, input fields rounded
    - Category limits displayed as clean, compact rows with icons and small inputs
    - Minimal icons: chart, category emojis, save icon, check/warning
    - Logo at top as required
    - Sample data shows realistic budget values
    - Mobile-first, max-width 400px, simple form-based layout
    - No backend, UI only, pre-filled sample fields
  -->
</body>
</html>
